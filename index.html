<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Главная | Nina Pakshina</title>
  <meta name="description" content="Персональная страница Nina Pakshina на GitHub Pages." />
  <style>
    :root {
      --bg-start: #0a7872;
      --bg-end: #1192a2;
      --surface: rgba(255, 255, 255, 0.2);
      --surface-strong: rgba(255, 255, 255, 0.3);
      --text-main: #f8fbfb;
      --text-muted: #d7ecec;
      --accent: #f05a00;
      --border: rgba(255, 255, 255, 0.45);
      --palette-orange: #f05a00;
      --palette-amber: #e8b126;
      --palette-mist: #d4cddb;
      --palette-teal: #0f8f99;
      --palette-deep-teal: #0b7270;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
    }

    body {
      font-family: "Inter", "Segoe UI", Arial, sans-serif;
      color: var(--text-main);
      background: radial-gradient(circle at top right, rgba(240, 90, 0, 0.55) 0%, transparent 35%),
        radial-gradient(circle at bottom left, rgba(232, 177, 38, 0.45) 0%, transparent 30%),
        linear-gradient(135deg, var(--bg-start) 0%, var(--bg-end) 100%);
      line-height: 1.6;
    }

    .container {
      width: min(920px, calc(100% - 2rem));
      margin: 0 auto;
    }

    .site-header {
      padding-top: 1.5rem;
    }

    .site-header .container {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
      padding: 0.95rem 1.1rem;
      border: 1px solid var(--border);
      background: var(--surface);
      border-radius: 16px;
      backdrop-filter: blur(8px);
    }

    .site-title {
      margin: 0;
      font-size: clamp(1.25rem, 2vw, 1.6rem);
      letter-spacing: 0.01em;
    }

    .site-nav {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .nav-link {
      display: inline-block;
      padding: 0.45rem 0.85rem;
      border-radius: 999px;
      border: 1px solid transparent;
      color: var(--text-main);
      text-decoration: none;
      transition: background-color 0.2s ease, border-color 0.2s ease, transform 0.2s ease;
    }

    .nav-link:hover {
      background: var(--surface-strong);
      border-color: var(--border);
      transform: translateY(-1px);
    }

    .nav-link-active {
      background: rgba(232, 177, 38, 0.3);
      border-color: rgba(240, 90, 0, 0.6);
    }

    .content {
      padding: 2rem 0 1.25rem;
    }

    .card {
      padding: clamp(1.1rem, 3vw, 2rem);
      border: 1px solid var(--border);
      border-radius: 20px;
      background: var(--surface);
      box-shadow: 0 12px 30px rgba(5, 66, 67, 0.3);
      backdrop-filter: blur(8px);
    }

    .card h2 {
      margin-top: 0;
      margin-bottom: 0.6rem;
      font-size: clamp(1.4rem, 2.5vw, 1.85rem);
    }

    .card p {
      margin: 0.5rem 0 0;
      color: var(--text-main);
    }

    .card a {
      color: var(--accent);
    }

    .links-list {
      list-style: none;
      margin: 1.2rem 0 0;
      padding: 0;
      display: grid;
      gap: 0.75rem;
    }

    .links-list a {
      display: block;
      padding: 0.75rem 0.95rem;
      border: 1px solid var(--border);
      border-radius: 12px;
      color: #ffffff;
      text-decoration: none;
      font-weight: 600;
      background: linear-gradient(135deg, var(--palette-teal), var(--palette-deep-teal));
      transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
    }

    .links-list a:hover {
      transform: translateY(-2px);
      border-color: rgba(255, 255, 255, 0.8);
      box-shadow: 0 10px 20px rgba(8, 68, 72, 0.25);
    }

    .links-list li:nth-child(1) a {
      background: linear-gradient(135deg, #ff7f2f, var(--palette-orange));
    }

    .links-list li:nth-child(2) a {
      background: linear-gradient(135deg, #f4ca53, var(--palette-amber));
      color: #3f3100;
    }

    .links-list li:nth-child(3) a {
      background: linear-gradient(135deg, var(--palette-teal), var(--palette-deep-teal));
    }

    .site-footer {
      padding: 1.2rem 0 2rem;
    }

    .site-footer .container {
      color: var(--text-muted);
      text-align: center;
    }

    @media (max-width: 560px) {
      .site-header .container {
        padding: 0.85rem;
      }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="container">
      <h1 class="site-title">Nina Pakshina</h1>
      <nav class="site-nav" aria-label="Основная навигация">
        <a class="nav-link nav-link-active" href="index.html">Главная</a>
      </nav>
    </div>
  </header>

  <main class="container content">
    <section class="card">
      <h2>Добро пожаловать</h2>
      <p>
        Golang/Python Developer.
      </p>
      <ul class="links-list">
        <li>
          <a href="https://www.youtube.com/@PakshinaNina" target="_blank" rel="noopener noreferrer">
            YouTube
          </a>
        </li>
        <li>
          <a href="https://habr.com/ru/users/Ninako/" target="_blank" rel="noopener noreferrer">
            Habr
          </a>
        </li>
        <li>
          <a href="https://github.com/PakshNina/" target="_blank" rel="noopener noreferrer">
            GitHub
          </a>
        </li>
      </ul>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <small>© Nina Pakshina</small>
    </div>
  </footer>
</body>
</html>
